name: ScreenshotFromVideos

options:
  bundleIdPrefix: com.lucesumbrarum
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: FDMSRXXN73
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  SDWebImageWebPCoder:
    url: https://github.com/SDWebImage/SDWebImageWebPCoder.git
    from: 0.15.0

targets:
  ScreenshotFromVideos:
    type: application
    platform: macOS
    sources:
      - path: ScreenshotFromVideos
    dependencies:
      - package: SDWebImageWebPCoder
        product: SDWebImageWebPCoder
    info:
      path: ScreenshotFromVideos/Info.plist
      properties:
        CFBundleName: Stills From Video
        CFBundleDisplayName: Stills From Video
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSApplicationCategoryType: public.app-category.video
        NSHumanReadableCopyright: "Copyright © 2026 Luces Umbrarum. All rights reserved."
        NSHighResolutionCapable: true
        NSMainStoryboardFile: ""
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucesumbrarum.ScreenshotFromVideos
        PRODUCT_NAME: ScreenshotFromVideos
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
